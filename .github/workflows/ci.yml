name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "install.*"
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check
      - run: cargo clippy -- -D warnings
